kind = "web"
previewPath = "/"
title = "PaintFlow CRM"
version = "1.0.0"
id = "artifacts/paintflow-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25978

[services.development]
run = "pnpm --filter @workspace/paintflow-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/paintflow-crm", "run", "build" ]
publicDir = "artifacts/paintflow-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25978"
BASE_PATH = "/"
